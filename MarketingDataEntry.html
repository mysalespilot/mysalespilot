<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marketing Expense Entry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#f8e6bf;
    padding:40px 0;
}
.container{
    max-width:1200px;
    margin:auto;
    background:#ffffff;
    border-radius:6px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    overflow:hidden;
}
.header{
    background:#c86464;
    color:#fff;
    padding:22px;
    text-align:center;
    font-size:26px;
    font-weight:600;
}
.content{
    padding:35px 40px;
}
.row{
    display:flex;
    gap:20px;
    margin-bottom:22px;
    flex-wrap:wrap;
}
.field{
    flex:1;
    min-width:180px;
    display:flex;
    flex-direction:column;
}
.mode-toggle {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 30px;
    font-size: 16px;
    font-weight: 500;
}
.mode-toggle label {
    cursor: pointer;
    font-size: 15px;
    color: #c86464;
}
label{
    font-size:13px;
    font-weight:500;
    margin-bottom:6px;
    color:#333;
}
input,select{
    padding:10px 12px;
    border-radius:4px;
    border:1px solid #bdbdbd;
    font-size:13px;
    background:#fff;
    transition:all 0.25s ease;
}
input:focus,select:focus{
    outline:none;
    border-color:#c86464;
    background:#fff7f7;
    box-shadow:0 0 0 3px rgba(200,100,100,0.25);
}
input[readonly] {
    background: #f0f0f0;
    cursor: not-allowed;
}
.comment-box{
    max-width:360px;
}
.actions{
    text-align:center;
    margin-top:35px;
}
button{
    background:#c86464;
    color:#fff;
    border:none;
    padding:12px 34px;
    border-radius:4px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
}
button:hover{
    background:#b45555;
}
button:disabled{
    background:#999;
    cursor:not-allowed;
}
</style>
</head>

<body>

<div class="container">
<div class="header">Marketing Expense Entry Form</div>

<div class="content">

<!-- MODE TOGGLE -->
<div class="row mode-toggle">
  <label>
    <input type="radio" name="formMode" value="new" checked onchange="toggleMode()"> Create New Entry
  </label>
  <label>
    <input type="radio" name="formMode" value="modify" onchange="toggleMode()"> Modify Existing Entry
  </label>
</div>

<!-- ROW 1 -->
<div class="row">
<div class="field">
<label>Serial Number</label>
<input type="text" id="serialNo" placeholder="Auto-generated on submit" readonly>
</div>

<div class="field">
<label>Activity</label>
<select id="activity" onchange="onActivityChange()">
<option value="">Select</option>
<option>ATL</option>
<option>BTL</option>
<option>Mktg Admin & Others</option>
</select>
</div>

<div class="field">
<label>Sub Activity</label>
<select id="subActivity" onchange="onSubActivityChange()">
<option value="">Select</option>
</select>
</div>

<div class="field">
<label>Head Of Account</label>
<select id="head">
<option value="">Select</option>
</select>
</div>

</div>

<!-- ROW 2 -->
<div class="row">

<div class="field">
<label>State</label>
<select id="state">
<option>AP</option>
<option>TS</option>
<option>KA</option>
<option>TN</option>
</select>
</div>

<div class="field">
<label>Variant</label>
<select id="variant">
<option>Sunflower</option>
<option>RiceBran</option>
<option>Groundnut</option>
<option>Mustard</option>
</select>
</div>

<div class="field">
<label>Financial Year</label>
<select id="year">
<option value="">Select</option>
<option>2019-2020</option>
<option>2020-2021</option>
<option>2021-2022</option>
<option>2022-2023</option>
<option>2023-2024</option>
<option>2024-2025</option>
<option>2025-2026</option>
<option>2026-2027</option>
<option>2027-2028</option>
<option>2028-2029</option>
<option>2029-2030</option>
<option>2030-2031</option>
</select>
</div>


<div class="field">
<label>Month</label>
<select id="month">
<option>January</option><option>February</option><option>March</option>
<option>April</option><option>May</option><option>June</option>
<option>July</option><option>August</option><option>September</option>
<option>October</option><option>November</option><option>December</option>
</select>
</div>

</div>

<!-- ROW 3 -->
<div class="row">
    
<div class="field">
<label>Sub Head</label>
<select id="subHead">
<option value="">Select</option>
<option>Meta</option>
<option>Youtube</option>
<option>Google Display</option>
<option>APPs</option>
<option>Influncers</option>
<option>eCommerce</option>
<option>OTT</option>
<option>TV Channel Events sponsorships</option>
<option>Print Publications Events sponsorship</option>
<option>FM Radio Events Sponsorship</option>
<option>Event Sponsorships</option>
<option>Other Consumer Activations</option>
<option>GRP</option>
</select>
</div>

<div class="field">
<label>Quantity</label>
<input type="number" id="qty">
</div>

<div class="field">
<label>Budget Amt</label>
<input type="number" id="budget">
</div>

<div class="field">
<label>Actual Amt</label>
<input type="number" id="actual">
</div>
</div>

<!-- ROW 4 -->
<div class="row">

<div class="field comment-box">
<label>Comment</label>
<input type="text" id="comment" placeholder="Short comment">
</div>

</div>

<div class="actions">
<button id="saveBtn" onclick="submitForm()">Add Entry</button>
</div>

</div>
</div>

<script>

// IMPORTANT: Ensure this URL holds the latest deployment of your Google Apps Script
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzHk8GAZx7fBv0_-lLcZLHwbXX36UX_E2tJ6hVN8MGHBtTPuRbycWYeUV8M_SS87eYJ3A/exec";

const headLists={
ATL:["TVC Making/Editing/Dubbing","Satelite Channels/Cabel TV","Print media","FM Radio","Cinema Theatres","Digital Advertising","Press Conference","Hoardings","Bus/Auto Branding"],
POS:["Posters /Danglers","Display Charges/Quick Commerce","Leaflets","Banners","Dealer Boards/Arch Gates","T-Shirts"],
PROMO:["Calenders/Dairies/Gifts","Miscellaneous","Consumer Offer","Consumer Contest Gift","Roadshow","Consumer Activation","Exhibitions","Free Sampling","Distributor/ Retailer Meet"],
ADMIN:["AgenFY Retainer-Creative","AgenFY Retainer-PR","AgenFY Retainer-Digital","Consumer/ Retail l Audit","Communication expenses & Misc","Market Research"]
};

// Generates a Serial Number based on Timestamp (e.g. SN-20231025-143022)
function generateSerialNumber() {
    const now = new Date();

    const datePart =
        now.getFullYear().toString().slice(-2) +   // YY
        (now.getMonth() + 1).toString().padStart(2, '0') +  // MM
        now.getDate().toString().padStart(2, '0'); // DD

    const randomPart = Math.floor(100 + Math.random() * 900); // 3-digit

    return `SN-${datePart}-${randomPart}`;
}

function toggleMode() {
    const mode = document.querySelector('input[name="formMode"]:checked').value;
    const serialInput = document.getElementById("serialNo");
    const saveBtn = document.getElementById("saveBtn");

    if (mode === "new") {
        serialInput.value = "";
        serialInput.readOnly = true;
        serialInput.placeholder = "Auto-generated on submit";
        saveBtn.textContent = "Add Entry";
    } else {
        serialInput.value = "";
        serialInput.readOnly = false;
        serialInput.placeholder = "Enter exact Serial No to update...";
        saveBtn.textContent = "Update Entry";
    }
}

function onActivityChange(){
    subActivity.innerHTML="";
    head.innerHTML="<option>Select</option>";
    subActivity.disabled=false;

    if(activity.value==="ATL"){
        subActivity.innerHTML="<option>ATL</option>";
        subActivity.disabled=true;
        loadHeads(headLists.ATL);
    }
    else if(activity.value==="BTL"){
        subActivity.innerHTML="<option value='POS'>POS</option><option value='PROMO'>Promotional Activities</option>";
    }
    else if(activity.value==="Mktg Admin & Others"){
        subActivity.innerHTML="<option>Mktg Admin & Others</option>";
        subActivity.disabled=true;
        loadHeads(headLists.ADMIN);
    }
}

function onSubActivityChange(){
    if(subActivity.value==="POS") loadHeads(headLists.POS);
    if(subActivity.value==="PROMO") loadHeads(headLists.PROMO);
}

function loadHeads(list){
    head.innerHTML="<option>Select</option>";
    list.forEach(h=>{
        const o=document.createElement("option");
        o.textContent=h;
        head.appendChild(o);
    });
}

function submitForm(){
    if(!activity.value || !head.value){
        alert("Please select Activity and Head Of Account");
        return;
    }

    const mode = document.querySelector('input[name="formMode"]:checked').value;
    let finalSerialNo = document.getElementById("serialNo").value.trim();

    if (mode === "new") {
        finalSerialNo = generateSerialNumber();
        document.getElementById("serialNo").value = finalSerialNo; // Show it to the user
    } else {
        if (!finalSerialNo) {
            alert("Please provide the Serial Number you want to modify.");
            return;
        }
    }

    document.getElementById("saveBtn").disabled=true;

    // We now send 'action' and 'serialNo' so the backend knows what to do
    const payload={
        action: mode,          // "new" or "modify"
        serialNo: finalSerialNo,
        activity:activity.value,
        subActivity:subActivity.value,
        head:head.value,
        state:state.value,
        variant:variant.value,
        year:year.value,
        month:month.value,
        subHead:subHead.value,
        qty:qty.value,
        budget:budget.value,
        actual:actual.value,
        comment:comment.value
    };

    fetch(WEB_APP_URL,{
        method:"POST",
        mode:"no-cors",
        body:JSON.stringify(payload),
        headers:{"Content-Type":"application/json"}
    })
    .then(()=>{
        alert(`✅ Data submitted successfully!\nYour Serial No is: ${finalSerialNo}`);
        document.querySelectorAll("input[type='number'], input[type='text']").forEach(i=>{
            if(i.id !== 'serialNo' || mode === 'new') i.value=""; 
        });
        if (mode === "new") document.getElementById("serialNo").value = "";
        document.getElementById("saveBtn").disabled=false;
    })
    .catch(()=>{
        alert("❌ Error saving data");
        document.getElementById("saveBtn").disabled=false;
    });
}

</script>
</body>
</html>
