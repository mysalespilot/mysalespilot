<!DOCTYPE html>
<html lang="en">
<HeadOfAccount>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Expense Entry</title>

<style>
/* ===== CSS START ===== */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e3edfb;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    max-width: 1100px;
    width: 95%;
    margin: 40px auto;
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0, 50, 100, 0.1);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #1a4a8e;
}

.mode {
    text-align: center;
    margin-bottom: 30px;
    padding: 15px;
    background: #f0f7ff;
    border-radius: 8px;
    border: 1px solid #d1e3f8;
}

.mode label {
    margin: 0 15px;
    font-weight: 600;
    color: #2c5ba1;
    cursor: pointer;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.field {
    display: flex;
    flex-direction: column;
}

.field.full {
    grid-column: span 3;
}

label {
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
}

input, select {
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #cbd5e0;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 30px;
    background: #2b6cb0;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}
/* ===== CSS END ===== */
</style>
</HeadOfAccount>

<body>

<div class="container">

<h1>Marketing Expense Entry</h1>

<div class="mode">
<label><input type="radio" name="mode" value="new" checked> New</label>
<label><input type="radio" name="mode" value="update"> Update</label>
<label><input type="radio" name="mode" value="addition"> Addition</label>
</div>

<div class="form-grid">

<div class="field">
<label>Serial No</label>
<input type="text" id="serialNo" readonly>
</div>

<div class="field">
<label>Activity</label>
<select id="activity">
<option value="">Select</option>
<option>ATL</option>
<option>BTL</option>
<option>ADMIN</option>
</select>
</div>

<div class="field">
<label>Sub Activity</label>
<select id="subActivity"></select>
<option>POS</option>
<option>Promotional Activities</option>
</div>

<div class="field">
<label>Head Of Account</label>
<select id="HeadOfAccount"></select>
</div>

<div class="field">
<label>State</label>
<select id="state"></select>
</div>

<div class="field">
<label>Variant</label>
<select id="variant"></select>
</div>

<div class="field">
<label>Year</label>
<select id="year"></select>
</div>

<div class="field">
<label>Month</label>
<select id="month"></select>
</div>

<div class="field">
<label>Qty</label>
<input type="number" id="qty">
</div>

<div class="field">
<label>Budget</label>
<input type="number" id="budget">
</div>

<div class="field">
<label>Actual</label>
<input type="number" id="actual">
</div>

<div class="field full">
<label>Comment</label>
<input type="text" id="comment">
</div>

</div>

<button id="submitBtn">Submit</button>

</div>

<script>
// ===== JS START =====

// 🔗 YOUR WEB APP URL
const WEB_APP_URL = "YOUR_WEB_APP_URL_HERE"; // Replace if needed

const states = ["AP", "TS", "KA", "TN"];
const variants = ["Sunflower", "Rice Bran", "Groundnut", "Mustard"];
const years = ["2023-24", "2024-25", "2025-26"];
const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

window.onload = function () {
    generateSerial();
    fill("state", states);
    fill("variant", variants);
    fill("year", years);
    fill("month", months);
};

function generateSerial(){
    const now = new Date();
    document.getElementById("serialNo").value =
        "SN-" + now.getTime();
}

function fill(id, arr){
    let el = document.getElementById(id);
    arr.forEach(x=>{
        el.innerHTML += `<option>${x}</option>`;
    });
}

// Submit
document.getElementById("submitBtn").onclick = function(){

    const payload = {
        mode: document.querySelector("input[name='mode']:checked").value,
        serialNo: document.getElementById("serialNo").value,
        activity: document.getElementById("activity").value,
        subActivity: document.getElementById("subActivity").value,
        HeadOfAccount: document.getElementById("HeadOfAccount").value,
        state: document.getElementById("state").value,
        variant: document.getElementById("variant").value,
        year: document.getElementById("year").value,
        month: document.getElementById("month").value,
        qty: document.getElementById("qty").value,
        budget: document.getElementById("budget").value,
        actual: document.getElementById("actual").value,
        comment: document.getElementById("comment").value
    };

    fetch(WEB_APP_URL,{
        method:"POST",
        body:JSON.stringify(payload)
    })
    .then(()=>alert("Success"))
    .catch(()=>alert("Error"));

};

// ===== JS END =====
</script>

</body>
</html>
