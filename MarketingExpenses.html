<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Marketing Expense Form</title><link href="https://gefindia-net.fortimailcloud.com/fmlurlsvc/?fewReq=:B:JVs5MjYwOSV1PjEtMyVqZz4zMjkzMiVwamRtYnd2cWY+NDFnN2A2YmcyMjtgM2ZnZTc6NDIxZmA2NGE3MTM0NDE1YmZmMmc1NCV3PjI0NDU3MjsyOzslcmpnPjUwSzpJTUtAMjY7MzAyNS41MEs6SU1LRzI2OzMwMjUlcWBzdz5pYnpiZ2Zmc0NkZmVqbWdqYi1tZnclYD42MSVrZ28+Mw==&url=https%3a%2f%2ffonts.googleapis.com%2fcss2%3ffamily%3dPoppins%3awght%40300%3b400%3b500%3b600%26display%3dswap" rel="stylesheet"></link><link rel="stylesheet" href="style.css"></link></head><body>

    <div class="container">

        <h1>Marketing Expense Entry</h1>

        <div class="mode">
            <label><input type="radio" name="mode" value="new" checked="checked"></input> New Entry</label>
            <label><input type="radio" name="mode" value="update"></input> Update Entry</label>
            <label><input type="radio" name="mode" value="addition"></input> Addition Entry</label>
        </div>

        <div class="form-grid">

            <div class="field">
                <label>Serial Number</label>
                <input type="text" id="serialNo" placeholder="Auto-generated" readonly="readonly"></input></div>

            <div class="field">
                <label>Activity</label>
                <select id="activity"><option value="">Select</option><option value="ATL">ATL</option><option value="BTL">BTL</option><option value="ADMIN">Mktg Admin &amp; Others</option></select></div>

            <div class="field">
                <label>Sub Activity</label>
                <select id="subActivity"><option value="">Select</option></select></div>

            <div class="field">
                <label>Head</label>
                <select id="head"><option value="">Select</option></select></div>

            <div class="field">
                <label>State</label>
                <select id="state"><option value="">Select</option><option value="AP">AP</option><option value="TS">TS</option></select></div>

            <div class="field">
                <label>Variant</label>
                <select id="variant"><option value="">Select</option><option value="Sunflower">Sunflower</option><option value="Groundnut">Groundnut</option></select></div>

            <div class="field">
                <label>Financial Year</label>
                <select id="year"><option value="">Select</option><option value="2023-24">2023-24</option><option value="2024-25">2024-25</option><option value="2025-26">2025-26</option></select></div>

            <div class="field">
                <label>Month</label>
                <select id="month"><option value="">Select</option><option value="January">January</option><option value="February">February</option><option value="March">March</option><option value="April">April</option><option value="May">May</option><option value="June">June</option><option value="July">July</option><option value="August">August</option><option value="September">September</option><option value="October">October</option><option value="November">November</option><option value="December">December</option></select></div>

            <div class="field">
                <label>Quantity</label>
                <input type="number" id="qty"></input></div>

            <div class="field">
                <label>Budget</label>
                <input type="number" id="budget"></input></div>

            <div class="field">
                <label>Actual</label>
                <input type="number" id="actual"></input></div>

            <div class="field full">
                <label>Comment</label>
                <input type="text" id="comment"></input></div>

        </div>

        Submit

    </div>

    </body></html>
