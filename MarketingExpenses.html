<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Expense Entry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#dbeafe,#e0f2fe);
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;margin:0;
}
.container {
    width:95%;max-width:1100px;padding:35px;
    border-radius:15px;background:#fff;
    box-shadow:0 20px 40px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-bottom:20px;color:#1e3a8a;}
.mode{text-align:center;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.field{display:flex;flex-direction:column;}
.field.full{grid-column:span 3;}
input,select{
    padding:12px;border-radius:8px;border:1px solid #ccc;
}
button{
    width:100%;padding:15px;margin-top:25px;
    background:#2563eb;color:#fff;border:none;border-radius:8px;
    font-weight:600;cursor:pointer;
}
button:hover{background:#1e40af;}
@media(max-width:768px){
    .form-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<h1>Marketing Expense Entry</h1>

<div class="mode">
<label><input type="radio" name="mode" value="new" checked> New</label>
<label><input type="radio" name="mode" value="update"> Update</label>
<label><input type="radio" name="mode" value="addition"> Addition</label>
</div>

<div class="form-grid">

<div class="field">
<label>Serial No</label>
<input type="text" id="serialNo" readonly>
</div>

<div class="field">
<label>Activity</label>
<select id="activity">
<option value="">Select</option>
<option value="ATL">ATL</option>
<option value="BTL">BTL</option>
<option value="ADMIN">ADMIN</option>
</select>
</div>

<div class="field">
<label>Sub Activity</label>
<select id="subActivity"></select>
</div>

<div class="field">
<label>Head Of Account</label>
<select id="head"></select>
</div>

<div class="field"><label>State</label><select id="state"></select></div>
<div class="field"><label>Variant</label><select id="variant"></select></div>
<div class="field"><label>Year</label><select id="year"></select></div>
<div class="field"><label>Month</label><select id="month"></select></div>

<div class="field"><label>Qty</label><input type="number" id="qty"></div>
<div class="field"><label>Budget</label><input type="number" id="budget"></div>
<div class="field"><label>Actual</label><input type="number" id="actual"></div>

<div class="field full">
<label>Comment</label>
<input type="text" id="comment">
</div>

</div>

<button id="submitBtn">Submit</button>

</div>

<script>

// 🔗 REPLACE THIS WITH YOUR REAL SCRIPT URL
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhsYFcSW0sIGGvwXyDPh4dj4__wKLGYETGQZZN9SK4L1yOzsyrqapLDscLEBO_OfU5/exec";

// ===== HEAD LIST =====
const headLists = {
ATL:["TVC Making/Editing/Dubbing","Satelite Channels/Cabel TV","Print media","FM Radio","Cinema Theatres","Digital Advertising","Press Conference","Hoardings","Bus/Auto Branding"],
POS:["Posters /Danglers","Display Charges/Quick Commerce","Leaflets","Banners","Dealer Boards/Arch Gates","T-Shirts"],
PROMO:["Calenders/Dairies/Gifts","Miscellaneous","Consumer Offer","Consumer Contest Gift","Roadshow","Consumer Activation","Exhibitions","Free Sampling","Distributor/ Retailer Meet"],
ADMIN:["AgenFY Retainer-Creative","AgenFY Retainer-PR","AgenFY Retainer-Digital","Consumer/ Retail l Audit","Communication expenses & Misc","Market Research"]
};

const states = ["AP","TS","KA","TN"];
const variants = ["Sunflower","Rice Bran","Groundnut","Mustard"];
const years = ["2023-24","2024-25","2025-26"];
const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

window.onload = function(){
    generateSerial();
    fill("state", states);
    fill("variant", variants);
    fill("year", years);
    fill("month", months);
};

// Serial
function generateSerial(){
    document.getElementById("serialNo").value = "SN-" + Date.now();
}

// Fill dropdown
function fill(id, arr){
    let el = document.getElementById(id);
    el.innerHTML = "<option value=''>Select</option>";
    arr.forEach(x => el.innerHTML += `<option>${x}</option>`);
}

// ===== MODE CHANGE =====
document.querySelectorAll("input[name='mode']").forEach(r=>{
    r.addEventListener("change",()=>{
        let mode = document.querySelector("input[name='mode']:checked").value;
        let serial = document.getElementById("serialNo");

        if(mode==="new"){
            generateSerial();
            serial.readOnly=true;
        }else{
            serial.value="";
            serial.readOnly=false;
            serial.placeholder="Enter Serial No";
        }
    });
});

// ===== FETCH DATA =====
document.getElementById("serialNo").addEventListener("change",()=>{
    let serial = serialNo.value.trim();
    let mode = document.querySelector("input[name='mode']:checked").value;

    if(!serial || mode==="new") return;

    fetch(WEB_APP_URL + "?serialNo=" + serial)
    .then(res=>res.json())
    .then(res=>{
        if(res.status==="found"){
            let d = res.data;

            activity.value = d.activity;
            subActivity.value = d.subActivity;
            fillHead(d.subActivity || d.activity);

            head.value = d.head;
            state.value = d.state;
            variant.value = d.variant;
            year.value = d.year;
            month.value = d.month;
            qty.value = d.qty;
            budget.value = d.budget;
            actual.value = d.actual;
            comment.value = d.comment;
        }else{
            alert("Record not found");
        }
    })
    .catch(err=>{
        alert("Fetch Error: "+err.message);
    });
});

// ===== CASCADING =====
activity.onchange = ()=>{
    subActivity.innerHTML = "<option>Select</option>";
    head.innerHTML = "<option>Select</option>";

    if(activity.value==="ATL"){
        subActivity.innerHTML="<option value='ATL'>ATL</option>";
        subActivity.disabled=true;
        fillHead("ATL");
    }
    else if(activity.value==="BTL"){
        subActivity.disabled=false;
        subActivity.innerHTML="<option value='POS'>POS</option><option value='PROMO'>PROMO</option>";
    }
    else if(activity.value==="ADMIN"){
        subActivity.innerHTML="<option value='ADMIN'>ADMIN</option>";
        subActivity.disabled=true;
        fillHead("ADMIN");
    }
};

subActivity.onchange = ()=> fillHead(subActivity.value);

function fillHead(type){
    head.innerHTML="<option>Select</option>";
    if(headLists[type]){
        headLists[type].forEach(h=>{
            head.innerHTML += `<option>${h}</option>`;
        });
    }
}

// ===== SUBMIT =====
submitBtn.onclick = ()=>{
    let payload = {
        mode: document.querySelector("input[name='mode']:checked").value,
        serialNo: serialNo.value,
        activity: activity.value,
        subActivity: subActivity.value,
        head: head.value,
        state: state.value,
        variant: variant.value,
        year: year.value,
        month: month.value,
        qty: qty.value,
        budget: budget.value,
        actual: actual.value,
        comment: comment.value
    };

    fetch(WEB_APP_URL,{
        method:"POST",
        body:JSON.stringify(payload)
    })
    .then(res=>res.json())
    .then(res=>{
        if(res.status==="success"){
            alert("✅ " + res.message);
            location.reload();
        }else{
            alert("❌ " + res.message);
        }
    })
    .catch(err=>{
        alert("Error: "+err.message);
    });
};

</script>

</body>
</html>
