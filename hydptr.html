body{

.header{

.login-card{

input,select{

input:focus,
select:focus{

button{

    border:none;
    border-radius:6px;
    cursor:pointer;
    color:#fff;
    font-size:15px;
    background:#2563eb;
}

button:hover{
    background:#1d4ed8;
}

.hidden{
    display:none;
}

.form-container{
    max-width:800px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.field.full{
    grid-column:span 2;
}

.button-group{
    max-width:800px;
    margin:20px auto;
    display:flex;
    gap:15px;
}

.submit-btn{

}

.submit-btn:hover{
    background:#059669;
}

.reset-btn{
    background:#ef4444;
}

.reset-btn:hover{

}

.loader{
    display:none;
    text-align:center;
    font-weight:600;
    color:#2563eb;
    margin-bottom:15px;
}

@media(max-width:768px){

.form-container{
grid-template-columns:1fr;
}

.field.full{
grid-column:span 1;
}

.login-card{
width:90%;
}

.button-group{
flex-direction:column;
}

}

</style>
</head>

<script>

/**************************************************
 GOOGLE APPS SCRIPT URL
**************************************************/

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwtIHMkQW_ZrID9A5O86GhdeClA0_3ghVQR2Ug300dcc-6ojryNdmJjt9jPcWRT-SFvtA/exec";

const SUBZONE = "HYD Metro";

const EMPLOYEE_API =
`${SCRIPT_URL}?state=${encodeURIComponent(SUBZONE)}`;

/**************************************************
 EMPLOYEE MASTER
**************************************************/

let employees = {};

async function loadEmployees(){

    try{

        const response = await fetch(EMPLOYEE_API);

        const data = await response.json();

        employees = {};

        data.forEach(emp=>{

            employees[
                String(emp.employeeId).trim()
            ] = emp.employeeName;

        });

    }

    catch(error){

        console.error(error);

        alert("Unable to load Employee Master");

    }

}

loadEmployees();

/**************************************************
 AUTO FILL EMPLOYEE NAME
**************************************************/

document.getElementById("userId")
.addEventListener("input",function(){

    const empId = this.value.trim();

    document.getElementById("userName").value =
        employees[empId] || "";

});

/**************************************************
 OPEN FORM
**************************************************/

function openForm(){

    const empId =
        document.getElementById("userId").value.trim();

    const empName =
        document.getElementById("userName").value.trim();

    if(empId === "" || empName === ""){

        alert("Invalid Employee ID");

        return;

    }

    document.getElementById("loginPage")
    .classList.add("hidden");

    document.getElementById("formPage")
    .classList.remove("hidden");

    document.getElementById("displayUser").innerHTML =
        "Logged in as : <b>" +
        empName +
        "</b> (" +
        empId +
        ")";

}

/**************************************************
 SUBMIT TO GOOGLE SHEET
**************************************************/

async function submitForm(){

    const requiredFields = [
        "district",
        "town",
        "brand",
        "beat",
        "outlet",
        "sf1_ptr",
        "sf1_ptc",
        "sf5_ptr",
        "sf5_ptc"
    ];

    for(let field of requiredFields){

        if(
            document
            .getElementById(field)
            .value
            .trim() === ""
        ){

            alert("Please fill all fields");

            return;

        }

    }

    const data = {

        employeeId:
        document.getElementById("userId").value,

        employeeName:
        document.getElementById("userName").value,

        subzone:
        document.getElementById("subzone").value,

        district:
        document.getElementById("district").value,

        town:
        document.getElementById("town").value,

        brand:
        document.getElementById("brand").value,

        beat:
        document.getElementById("beat").value,

        outlet:
        document.getElementById("outlet").value,

        sf1_ptr:
        document.getElementById("sf1_ptr").value,

        sf1_ptc:
        document.getElementById("sf1_ptc").value,

        sf5_ptr:
        document.getElementById("sf5_ptr").value,

        sf5_ptc:
        document.getElementById("sf5_ptc").value

    };

    let response, text, result;
    const submitBtn = document.querySelector('.submit-btn');

    try{

        document.getElementById("loader").style.display = "block";
        if(submitBtn) submitBtn.disabled = true;

        response = await fetch(
            SCRIPT_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(data)
            }
        );

        text = await response.text();

        try{ result = JSON.parse(text); } catch(e){ result = null; }

        if(!response.ok){
            console.error('HTTP error', response.status, text);
            alert('Unable to save data. Server returned status ' + response.status);
            return;
        }

        if(result && result.status === "success"){
            alert("Data Saved Successfully");
            resetForm();
        }
        else if(result){
            alert("Error : " + result.message);
        }
        else{
            console.warn('Unexpected response from server:', text);
            alert('Unexpected server response. Check console for details.');
        }

    }

    catch(error){

        console.error(error);

        alert(
            "Unable to save data. Check Apps Script Deployment."
        );

    }

    finally{
        document.getElementById("loader").style.display = "none";
        if(submitBtn) submitBtn.disabled = false;
    }

}

/**************************************************
 RESET
**************************************************/

function resetForm(){

    document
    .querySelectorAll(
        "#formPage input"
    )
    .forEach(input=>{

        if(
            input.id !== "subzone"
        ){

            input.value = "";

        }

    });

    document
    .querySelectorAll(
        "#formPage select"
    )
    .forEach(select=>{

        select.selectedIndex = 0;

    });

}

</script>
