<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEF HR Lunch QR Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        /* ==========================================================
           GEF HR Lunch QR Scanner
           ========================================================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f4f7f6, #e8f5e9);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 430px;
        }

        .card {
            background: #ffffff;
            border-radius: 22px;
            padding: 35px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .12);
            animation: fadeIn .5s ease;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo {
            width: 95px;
            height: 95px;
            object-fit: contain;
        }

        h1 {
            text-align: center;
            color: #006b3f;
            font-size: 28px;
            font-weight: 700;
        }

        h2 {
            text-align: center;
            color: #777;
            font-size: 16px;
            margin-top: 8px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            height: 52px;
            border: 2px solid #dcdcdc;
            border-radius: 12px;
            padding: 0 15px;
            font-size: 16px;
            transition: .3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #006b3f;
            box-shadow: 0 0 12px rgba(0, 107, 63, .15);
        }

        #scanBtn {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 12px;
            background: #006b3f;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        #scanBtn:hover {
            background: #00894f;
            transform: translateY(-2px);
        }

        #scanBtn:active {
            transform: scale(.98);
        }

        #scanBtn:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        #reader {
            width: 100%;
            margin-top: 25px;
            display: none;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid #006b3f;
        }

        .hidden {
            display: none;
        }

        #loading {
            margin-top: 25px;
            text-align: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 5px solid #ddd;
            border-top: 5px solid #006b3f;
            border-radius: 50%;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        #loading p {
            margin-top: 15px;
            color: #555;
            font-weight: 500;
        }

        #statusBox {
            margin-top: 25px;
            border-radius: 12px;
            padding: 18px;
            animation: fadeIn .3s ease;
        }

        .success {
            background: #e8f8ef;
            border-left: 6px solid #28a745;
        }

        .error {
            background: #fdeaea;
            border-left: 6px solid #dc3545;
        }

        .warning {
            background: #fff7df;
            border-left: 6px solid #f4b400;
        }

        #statusTitle {
            font-size: 20px;
            margin-bottom: 10px;
            color: #333;
        }

        #statusMessage {
            color: #555;
            line-height: 1.6;
            font-size: 15px;
        }

        footer {
            margin-top: 25px;
            color: #777;
            font-size: 13px;
            text-align: center;
        }

        /* ==========================================================
           Animations
           ========================================================== */

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* ==========================================================
           Responsive
           ========================================================== */

        @media(max-width:768px) {
            .card {
                padding: 30px 22px;
            }

            h1 {
                font-size: 24px;
            }
        }

        @media(max-width:480px) {
            body {
                padding: 15px;
            }

            .card {
                padding: 25px 18px;
            }

            .logo {
                width: 80px;
                height: 80px;
            }

            h1 {
                font-size: 22px;
            }

            h2 {
                font-size: 15px;
            }

            #scanBtn {
                height: 52px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <div class="logo-section">
                <img src="https://img.icons8.com/?size=100&id=rPGBTf7rLJLc&format=png&color=000000" class="logo" id="logoImg">
            </div>

            <h1>Gemini Edibles & Fats</h1>
            <h2>HR Lunch QR Scanner</h2>

            <div class="input-group">
                <label>Employee Code</label>
                <input id="employeeCode" type="text" placeholder="Enter Employee Code" autocomplete="off">
            </div>

            <button id="scanBtn">📷 Scan Lunch QR</button>

            <div id="reader"></div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Verifying...</p>
            </div>

            <div id="statusBox" class="hidden">
                <h3 id="statusTitle"></h3>
                <p id="statusMessage"></p>
            </div>

            <footer>Gemini Edibles &amp; Fats &middot; HR Lunch Verification</footer>

        </div>
    </div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const employeeCodeInput = document.getElementById('employeeCode');
        const readerEl = document.getElementById('reader');
        const loadingEl = document.getElementById('loading');
        const statusBox = document.getElementById('statusBox');
        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');

        let html5QrCode = null;
        let isScanning = false;
        let scanLocked = false; // prevents duplicate onScanSuccess fires while stopping

        scanBtn.addEventListener('click', () => {
            const code = employeeCodeInput.value.trim();
            if (!code) {
                showStatus('error', '⚠️ Missing Employee Code', 'Please enter your Employee Code first.');
                return;
            }
            if (isScanning) return;
            startScanner();
        });

        function startScanner() {
            hideStatus();
            readerEl.classList.remove('hidden');
            readerEl.style.display = 'block';
            scanBtn.disabled = true;
            scanBtn.textContent = 'Scanning…';
            scanLocked = false;

            html5QrCode = new Html5Qrcode('reader', {
                // Uses the browser's native BarcodeDetector API when the device
                // supports it (most modern Android/Chrome) — this is significantly
                // faster than the pure-JS decoder fallback.
                useBarCodeDetectorIfSupported: true,
                verbose: false
            });
            isScanning = true;

            html5QrCode.start(
                // Lower requested camera resolution = fewer pixels per frame to
                // scan = faster decode loop. 720p is plenty for a QR code held
                // at a normal distance.
                {
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                {
                    fps: 20,                              // was 10 — more scan attempts per second
                    qrbox: { width: 260, height: 260 },
                    aspectRatio: 1.0,
                    disableFlip: true                     // skip the flipped-image scan pass (halves work per frame)
                },
                onScanSuccess,
                () => { /* ignore per-frame scan errors */ }
            ).catch((err) => {
                isScanning = false;
                readerEl.style.display = 'none';
                readerEl.classList.add('hidden');
                scanBtn.disabled = false;
                scanBtn.textContent = '📷 Scan Lunch QR';
                showStatus('error', '❌ Camera Error', 'Could not access the camera: ' + err);
            });
        }

        function onScanSuccess(decodedText) {
            if (scanLocked) return;
            scanLocked = true;
            stopScanner();
            verifyScan(decodedText);
        }

        function stopScanner() {
            if (html5QrCode && isScanning) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    isScanning = false;
                    readerEl.style.display = 'none';
                    readerEl.classList.add('hidden');
                }).catch(() => {
                    isScanning = false;
                });
            }
        }

        function verifyScan(qrData) {
            loadingEl.classList.remove('hidden');
            hideStatus();
            scanBtn.disabled = true;

            google.script.run
                .withSuccessHandler(onVerifyResult)
                .withFailureHandler(onVerifyFailure)
                .verifyAndLogLunch(employeeCodeInput.value.trim(), qrData);
        }

        function onVerifyResult(result) {
            loadingEl.classList.add('hidden');
            scanBtn.disabled = false;
            scanBtn.textContent = '📷 Scan Lunch QR';
            showStatus(result.status, result.title, result.message);
        }

        function onVerifyFailure(error) {
            loadingEl.classList.add('hidden');
            scanBtn.disabled = false;
            scanBtn.textContent = '📷 Scan Lunch QR';
            showStatus('error', '⚠️ Server Error', error.message || String(error));
        }

        function showStatus(status, title, message) {
            statusBox.classList.remove('hidden', 'success', 'error', 'warning');
            statusBox.classList.add(status);
            statusTitle.textContent = title;
            statusMessage.textContent = message;
        }

        function hideStatus() {
            statusBox.classList.add('hidden');
            statusBox.classList.remove('success', 'error', 'warning');
        }
    </script>

</body>

</html>
