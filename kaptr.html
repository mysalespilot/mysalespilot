<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karnataka Competitor Price Entry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:linear-gradient(135deg,#dbeafe,#eff6ff);
}

.header{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    padding:25px;
    color:#fff;
    text-align:center;
}

.login-card{
    width:400px;
    margin:80px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,.1);
}

.field{
    display:flex;
    flex-direction:column;
    margin-bottom:15px;
}

label{
    margin-bottom:5px;
    font-size:14px;
    color:#374151;
}

input,select{
    padding:12px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    background:#f8fafc;
    font-size:14px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#2563eb;
    background:#fff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:#fff;
    font-size:15px;
    background:#2563eb;
}

button:hover{
    background:#1d4ed8;
}

.hidden{
    display:none;
}

.form-container{
    max-width:800px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.field.full{
    grid-column:span 2;
}

.button-group{
    max-width:800px;
    margin:20px auto;
    display:flex;
    gap:15px;
}

.submit-btn{
    background:#10b981;
}

.submit-btn:hover{
    background:#059669;
}

.reset-btn{
    background:#ef4444;
}

.reset-btn:hover{
    background:#dc2626;
}

.loader{
    display:none;
    text-align:center;
    font-weight:600;
    color:#2563eb;
    margin-bottom:15px;
}

@media(max-width:768px){

.form-container{
grid-template-columns:1fr;
}

.field.full{
grid-column:span 1;
}

.login-card{
width:90%;
}

.button-group{
flex-direction:column;
}

}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="header">
<h1>Karnataka Competitor Price</h1>
</div>

<div class="login-card">

<h2>Employee Login</h2>

<div class="field">
<label>Employee ID</label>
<input type="text" id="userId" placeholder="Enter Employee ID">
</div>

<div class="field">
<label>Employee Name</label>
<input type="text" id="userName" readonly placeholder="Auto Filled">
</div>

<button onclick="openForm()">Open Form</button>

</div>

</div>

<!-- FORM PAGE -->

<div id="formPage" class="hidden">

<div class="header">
<h1>Price Entry Form</h1>
<p id="displayUser"></p>
</div>

<div class="loader" id="loader">
Saving Data...
</div>

<div class="form-container">

<div class="field full">
<label>Subzone</label>
<input type="text" id="subzone" value="Karnataka" readonly>
</div>

<div class="field">
<label>Area Name</label>
<select id="district" required>
<option value="Bagalkot">Bagalkot</option>
<option value="Bangalore">Bangalore</option>
<option value="Bangalore Rural">Bangalore Rural</option>
<option value="Belgaum">Belgaum</option>
<option value="Bellary">Bellary</option>
<option value="Bidar">Bidar</option>
<option value="Bijapur">Bijapur</option>
<option value="Chamarajanagar">Chamarajanagar</option>
<option value="Chikkaballapura">Chikkaballapura</option>
<option value="Chikmagalur">Chikmagalur</option>
<option value="Chitradurga">Chitradurga</option>
<option value="Dakshina Kannada">Dakshina Kannada</option>
<option value="Davanagere">Davanagere</option>
<option value="Dharwad">Dharwad</option>
<option value="Gadag">Gadag</option>
<option value="Mangalore">Mangalore</option>
<option value="Gulbarga">Gulbarga</option>
<option value="Hassan">Hassan</option>
<option value="Haveri">Haveri</option>
<option value="Kodagu">Kodagu</option>
<option value="Kolar">Kolar</option>
<option value="Koppal">Koppal</option>
<option value="Mandya">Mandya</option>
<option value="Mangalore">Mangalore</option>
<option value="Mysore">Mysore</option>
<option value="Raichur">Raichur</option>
<option value="Ramanagara">Ramanagara</option>
<option value="Shimoga">Shimoga</option>
<option value="Tumkur">Tumkur</option>
<option value="Udupi">Udupi</option>
<option value="Uttara Kannada">Uttara Kannada</option>
<option value="Yadgir">Yadgir</option>
</select>
</div>

<div class="field">
<label>Town / Area Name</label>
<input type="text" id="town" required>
</div>

<div class="field">
<label>Brand Name</label>
<select id="brand" required>
<option value="">Select Brand</option>
<option value="Freedom">Freedom</option>
<option value="Aadhar">Aadhar</option>
<option value="Bangi Palli">Bangi Palli</option>
<option value="Bongi-Dalda">Bongi-Dalda</option>
<option value="Dalda">Dalda</option>
<option value="Dhara">Dhara</option>
<option value="Emami">Emami</option>
<option value="Fortune">Fortune</option>
<option value="Gemini">Gemini</option>
<option value="Gold Evia">Gold Evia</option>
<option value="Gold Winner">Gold Winner</option>
<option value="Health fit oil">Health fit oil</option>
<option value="Joy Life">Joy Life</option>
<option value="Mr.Gold">Mr.Gold</option>
<option value="Naturalle">Naturalle</option>
<option value="Sun Fresh">Sun Fresh</option>
<option value="Sun premium">Sun premium</option>
<option value="Sun Shakthi">Sun Shakthi</option>
<option value="Sun Taza">Sun Taza</option>
<option value="Sundrop">Sundrop</option>
<option value="Sungold">Sungold</option>
<option value="Sunpure">Sunpure</option>
<option value="Sunrich">Sunrich</option>
<option value="Sunsolite">Sunsolite</option>
<option value="Sunflow Gold">Sunflow Gold</option>
</select>
</div>

<div class="field">
<label>Beat Name</label>
<input type="text" id="beat" required>
</div>

<div class="field full">
<label>Outlet Name</label>
<input type="text" id="outlet" required>
</div>

<div class="field">
<label>SF 1 Ltr PTR</label>
<input type="number" id="sf1_ptr" required>
</div>

<div class="field">
<label>SF 1 Ltr PTC</label>
<input type="number" id="sf1_ptc" required>
</div>

<div class="field">
<label>SF 5 Ltr PTR</label>
<input type="number" id="sf5_ptr" required>
</div>

<div class="field">
<label>SF 5 Ltr PTC</label>
<input type="number" id="sf5_ptc" required>
</div>

</div>

<div class="button-group">
<button class="submit-btn" onclick="submitForm()">Submit</button>
<button class="reset-btn" onclick="resetForm()">Refresh</button>
</div>

</div>

<script>

/**************************************************
 GOOGLE APPS SCRIPT URL
**************************************************/

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwtIHMkQW_ZrID9A5O86GhdeClA0_3ghVQR2Ug300dcc-6ojryNdmJjt9jPcWRT-SFvtA/exec";

const SUBZONE = "Karnataka";

const EMPLOYEE_API =
`${SCRIPT_URL}?state=${encodeURIComponent(SUBZONE)}`;

/**************************************************
 EMPLOYEE MASTER
**************************************************/

let employees = {};

async function loadEmployees(){

    try{

        const response = await fetch(EMPLOYEE_API);

        const data = await response.json();

        employees = {};

        data.forEach(emp=>{

            employees[
                String(emp.employeeId).trim()
            ] = emp.employeeName;

        });

    }

    catch(error){

        console.error(error);

        alert("Unable to load Employee Master");

    }

}

loadEmployees();

/**************************************************
 AUTO FILL EMPLOYEE NAME
**************************************************/

document.getElementById("userId")
.addEventListener("input",function(){

    const empId = this.value.trim();

    document.getElementById("userName").value =
        employees[empId] || "";

});

/**************************************************
 OPEN FORM
**************************************************/

function openForm(){

    const empId =
        document.getElementById("userId").value.trim();

    const empName =
        document.getElementById("userName").value.trim();

    if(empId === "" || empName === ""){

        alert("Invalid Employee ID");

        return;

    }

    document.getElementById("loginPage")
    .classList.add("hidden");

    document.getElementById("formPage")
    .classList.remove("hidden");

    document.getElementById("displayUser").innerHTML =
        "Logged in as : <b>" +
        empName +
        "</b> (" +
        empId +
        ")";

}

/**************************************************
 SUBMIT TO GOOGLE SHEET
**************************************************/

async function submitForm(){

    const requiredFields = [
        "district",
        "town",
        "brand",
        "beat",
        "outlet",
        "sf1_ptr",
        "sf1_ptc",
        "sf5_ptr",
        "sf5_ptc"
    ];

    for(let field of requiredFields){

        if(
            document
            .getElementById(field)
            .value
            .trim() === ""
        ){

            alert("Please fill all fields");

            return;

        }

    }

    const data = {

        employeeId:
        document.getElementById("userId").value,

        employeeName:
        document.getElementById("userName").value,

        subzone:
        document.getElementById("subzone").value,

        district:
        document.getElementById("district").value,

        town:
        document.getElementById("town").value,

        brand:
        document.getElementById("brand").value,

        beat:
        document.getElementById("beat").value,

        outlet:
        document.getElementById("outlet").value,

        sf1_ptr:
        document.getElementById("sf1_ptr").value,

        sf1_ptc:
        document.getElementById("sf1_ptc").value,

        sf5_ptr:
        document.getElementById("sf5_ptr").value,

        sf5_ptc:
        document.getElementById("sf5_ptc").value

    };

    let response, text, result;
    const submitBtn = document.querySelector('.submit-btn');

    try{

        document.getElementById("loader").style.display = "block";
        if(submitBtn) submitBtn.disabled = true;

        response = await fetch(
            SCRIPT_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(data)
            }
        );

        text = await response.text();

        try{ result = JSON.parse(text); } catch(e){ result = null; }

        if(!response.ok){
            console.error('HTTP error', response.status, text);
            alert('Unable to save data. Server returned status ' + response.status);
            return;
        }

        if(result && result.status === "success"){
            alert("Data Saved Successfully");
            resetForm();
        }
        else if(result){
            alert("Error : " + result.message);
        }
        else{
            console.warn('Unexpected response from server:', text);
            alert('Unexpected server response. Check console for details.');
        }

    }

    catch(error){

        console.error(error);

        alert(
            "Unable to save data. Check Apps Script Deployment."
        );

    }

    finally{
        document.getElementById("loader").style.display = "none";
        if(submitBtn) submitBtn.disabled = false;
    }

}

/**************************************************
 RESET
**************************************************/

function resetForm(){

    document
    .querySelectorAll(
        "#formPage input"
    )
    .forEach(input=>{

        if(
            input.id !== "subzone"
        ){

            input.value = "";

        }

    });

    document
    .querySelectorAll(
        "#formPage select"
    )
    .forEach(select=>{

        select.selectedIndex = 0;

    });

}

</script>
